<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>passward website</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
    <div class="password"><h1>PASSWORD GENERATOR</h1></div>
    <div class="displaypasswordcontainer">
        <input readonly placeholder="password" class="display" data-passwordDisplay>
        
        
        <button class = "copyBtn" data-copy>
            <span class = "tooltip"  data-copyMsg></span>
            <img src="copy.png" alt="copy"  width="23"  height="23">
            
        </button>
  </div>
         <div class="inputcontainer">
  
    
        <div class="length"><h3>password Length</h3>
        <p data-lengthNumber> 0</p>
    </div>

        <!-- slider -->
         <input type = "range" min="1" max="20" class="slider" step="1" data-lengthSlider>
       <div class="allCheckBox">
         <div class="check">
            <input type="checkbox" id="uppercase">
         <label for="uppercase">Include Uppercase letter</label>
         </div>
         <div class="check">
            <input type="checkbox" id="lowercase">
         <label for="lowercase">Include Lowercase letter</label>
         </div>
         <div class="check">
             <input type="checkbox" id="numbers">
         <label for="numbers">Include Numbers</label>
         </div>
         <div class="check">
            <input type="checkbox" id="Symbols">
         <label for="symbols">Include Symbols</label>
         </div>
      </div>

         <div class="extrapart"><h3>Strength</h3>
        <div class="circle"></div>
        </div>
         <div class="generate"><button>Generate passward</button> </div>
</div>
</div>

    <script src="index.js"></script>
</body>
</html>
